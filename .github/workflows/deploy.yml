name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/ultracode-effort-6q9pqq]
  workflow_dispatch:

# Publish the built site to the gh-pages branch (served via "Deploy from a
# branch" mode). A .nojekyll marker is added so GitHub serves the static files
# as-is — critical, because Astro's assets live in an _astro/ folder that
# Jekyll would otherwise ignore.
permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - name: Publish dist/ to the gh-pages branch
        run: |
          cd site/dist
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
